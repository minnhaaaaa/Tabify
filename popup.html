<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabify</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ─── Header ─── -->
  <header class="header">
    <div class="header-brand">
      <div class="logo-mark">
        <img src="logo.png" alt="Tabify AI Logo" class="logo-image">
      </div>
      <span class="brand-name">Tabify</span>
    </div>

    <div class="header-meta">
      <span class="tab-count" id="totalCount">0 tabs</span>
      <button class="icon-btn" title="Settings">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ─── Status Bar ─── -->
  <div class="status-bar">
    <div class="status-dot idle" id="statusDot"></div>
    <span class="status-text" id="statusText">Ready to analyse your tabs</span>
  </div>

  <!-- ─── Action Zone ─── -->
  <div class="action-zone">
    <button class="btn-primary" id="autoGroupBtn">
      <span class="btn-label" id="btnLabel">Auto Group</span>
      <span class="btn-shortcut" id="btnShortcut">⌘G</span>
      <div class="progress-container" id="progressContainer">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </button>

    <div class="secondary-actions">
      <button class="btn-ghost" id="saveSessionBtn">Save Workspace</button>
      <button class="btn-ghost" id="cleanupBtn">Clean up</button>
      <button class="btn-ghost" id="ungroupAllBtn">Ungroup All</button>
      <button class="btn-ghost danger" id="deleteAllGroupsBtn">Delete All Tabs in Groups</button>
    </div>

    <div class="toggle-row" id="toggleRow">
      <div class="toggle-info">
        <span class="toggle-label">Dynamic grouping</span>
        <span class="toggle-sub" id="toggleStatus">Manual mode</span>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="dynamicToggle" />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- Inactive Slider -->
    <div class="slider-container">
      <div class="slider-header">
        <span class="slider-label">Inactive threshold</span>
        <span class="slider-value" id="inactiveValue">20m</span>
      </div>
      <input type="range" id="inactiveSlider" min="2" max="45" value="20" class="range-slider">
    </div>
  </div>

  <!-- ─── Active Groups ─── -->
  <section class="groups-section">
    <div class="section-header">
      <span class="section-label">Active groups</span>
      <span class="pill" id="groupCount">0</span>
    </div>

    <div class="groups-list" id="groupsList">
      <div class="empty-state" id="emptyState">
        <p class="empty-title">No groups yet</p>
        <p class="empty-sub">Hit Auto Group to organise your tabs</p>
      </div>
    </div>
  </section>

  <!-- ─── Saved Workspaces ─── -->
  <section class="groups-section" style="border-top: 1px solid var(--border); margin-top: 12px;">
    <div class="section-header">
      <span class="section-label">Saved Workspaces</span>
    </div>
    <div id="sessionsList" class="groups-list">
      <p id="noSessions" style="text-align:center;opacity:0.5;padding:12px;font-size:11px;">No saved workspaces</p>
    </div>
  </section>

  <!-- ─── Cleanup Panel (Overlay) ─── -->
  <div id="cleanupPanel" class="overlay-panel" style="display:none;">
    <div class="panel-content">
      <div class="panel-header">
        <h3>Cleanup Suggestions</h3>
        <button id="closeCleanupPanel" class="close-btn">&times;</button>
      </div>
      <div id="cleanupList" class="cleanup-list"></div>
      <div class="panel-footer">
        <button id="closeAllSuggested" class="btn-danger">Close All Suggested</button>
      </div>
    </div>
  </div>

  <!-- ─── Save Workspace Panel (Overlay) ─── -->
  <div id="savePanel" class="overlay-panel" style="display:none;">
    <div class="panel-content">
      <div class="panel-header">
        <h3>Save Workspace</h3>
        <button id="closeSavePanel" class="close-btn">&times;</button>
      </div>
      <div class="input-group">
        <input type="text" id="sessionNameInput" placeholder="Workspace name (e.g. Research Project)">
      </div>
      <div class="selection-header" style="padding: 0 16px 8px; font-size: 11px; color: var(--text-3); font-family: var(--font-mono);">
        SELECT TABS TO SAVE
      </div>
      <div id="tabSelectionList" class="cleanup-list" style="border-top: 1px solid var(--border);">
        <!-- Current tabs with checkboxes will be listed here -->
      </div>
      <div class="panel-footer">
        <button id="confirmSave" class="btn-primary">Save Selected Tabs</button>
      </div>
    </div>
  </div>

  <!-- ─── Footer ─── -->
  <footer class="footer">
    <div class="footer-indicators">
      <span class="indicator active"></span>
      <span class="indicator"></span>
      <span class="indicator"></span>
    </div>
    <span class="footer-version">v1.0.6</span>
  </footer>

  <script src="classifier.js"></script>
  <script src="popup.js"></script>
</body>
</html>
